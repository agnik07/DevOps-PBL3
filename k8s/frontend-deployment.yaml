apiVersion: apps/v1
kind: Deployment

metadata:
  name: student-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: student-frontend

  template:
    metadata:
      labels:
        app: student-frontend

    spec:
      containers:
        - name: frontend
          image: agnik007/devops-pbl3-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5